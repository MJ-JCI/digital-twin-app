// ✅ populate dropdowns
let views = [...new Set(data.map(d => d.view))];
let rooms = [...new Set(data.map(d => d.room))];

views.forEach(v => {
    let o = document.createElement("option");
    o.value = v;
    o.text = v;
    document.getElementById("viewFilter").appendChild(o);
});

rooms.forEach(r => {
    let o = document.createElement("option");
    o.value = r;
    o.text = r;
    document.getElementById("roomFilter").appendChild(o);
});


// ✅ render function
function render() {

    let search = document.getElementById("search").value.toLowerCase();
    let viewF = document.getElementById("viewFilter").value;
    let roomF = document.getElementById("roomFilter").value;

    let html = "";
    let count = 0;

    for (let item of data) {

        if (
            item.asset.toLowerCase().includes(search) &&
            (viewF === "" || item.view === viewF) &&
            (roomF === "" || item.room === roomF)
        ) {

            html += `
            <div class="row">
                <div class="asset">${item.asset}</div>

                <div class="actions">
                    <button onclick="openLink('${item.viewer}')">Viewer</button>
                    <button onclick="openLink('${item.images}')">Images</button>
                    <button onclick="playVideo('${item.clean}')">▶ Clean</button>
                    <button onclick="playVideo('${item.meta}')">▶ Meta</button>
                    <button onclick="playVideo('${item.comp}')">▶ Comp</button>
                    <button onclick="playVideo('${item.meta_comp}')">▶ Meta Comp</button>
                </div>
            </div>
            `;

            count++;
            if (count > 200) break;
        }
    }

    document.getElementById("count").innerText =
        "Showing: " + count + " assets";

    document.getElementById("list").innerHTML = html;
}


// ✅ video player
function playVideo(url) {
    let v = document.getElementById("videoPlayer");
    v.src = url;
    v.play();
    v.scrollIntoView();
}


// ✅ open local links
function openLink(url) {
    if (url) window.open(url, "_blank");
}

render();

</script>
